name: 一般反馈
description: 反馈站点、内容结构、发布流程或其他建议
title: "[Feedback] "
labels: ["feedback"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 反馈范围
      options:
        - 内容阅读体验
        - 站点功能
        - 发布流程
        - 文档说明
        - 其他
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: 反馈内容
      description: 请描述你观察到的问题或建议。
    validations:
      required: true

